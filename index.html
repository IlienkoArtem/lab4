<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Saver - Розрахунок</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="glass-card">
        <div class="header">
            <span class="material-icons">account_balance_wallet</span>
            <h2>Smart Saver <small id="app-status" style="font-size: 0.5em; opacity: 0.7; display: block;"></small></h2>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label for="priceInput">Сума покупки (₴)</label>
                <input type="number" id="priceInput" placeholder="0.00">
            </div>

            <div class="input-group">
                <label for="discountInput">Ваша знижка (%)</label>
                <input type="number" id="discountInput" placeholder="0">
            </div>

            <button id="calcBtn">
                <span>Розрахувати</span>
                <span class="material-icons">trending_flat</span>
            </button>
        </div>

        <div class="results-container">
            <div class="result-item">
                <p>До сплати</p>
                <h3 id="finalPrice">0.00 ₴</h3>
            </div>
            <div class="result-item">
                <p>Кешбек (2%)</p>
                <h3 id="cashback" class="highlight">0.00 ₴</h3>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>

    <script type="module">
        // Vite автоматично підставляє значення з .env або .env.production 
        const statusElement = document.getElementById('app-status');
        if (statusElement) {
            statusElement.innerText = `Режим: ${import.meta.env.VITE_APP_STATUS}`;
        }
    </script>
</body>
</html>
